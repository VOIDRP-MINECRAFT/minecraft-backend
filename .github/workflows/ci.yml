name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + smoke + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voidrp
          POSTGRES_PASSWORD: voidrp
          POSTGRES_DB: voidrp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Smoke — compile all sources
        run: python -m compileall apps

      # Advisory until the codebase is fully ruff-clean.
      - name: Lint (ruff)
        continue-on-error: true
        run: |
          ruff check .
          ruff format --check .

      # Advisory until the test suite lands (needs the Postgres service above;
      # see docs — SQLite can't back the JSONB models).
      - name: Tests (pytest)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+psycopg://voidrp:voidrp@localhost:5432/voidrp_test
        run: pytest -q
